<!DOCTYPE html>
<html>
<head>
    <title>Cognitive AI Assistant</title>
</head>
<body style="background:black;color:white;text-align:center;margin-top:100px;">

    <h1>🧠 Cognitive AI Assistant</h1>
    <p>⚡ Real-time voice-based intelligent assistant</p>

    <button onclick="startListening()" style="padding:15px;font-size:18px;">
        🎤 Start
    </button>

    <p id="output"></p>

    <script>
        function startListening() {
            const output = document.getElementById("output");

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert("Use Chrome browser");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.start();

            recognition.onstart = function () {
                output.innerText = "🎤 Listening...";
            };

            recognition.onresult = function (event) {
                const text = event.results[0][0].transcript.toLowerCase();
                output.innerText = "You said: " + text;

                let reply = "";

                if (text.includes("time")) {
                    reply = "The time is " + new Date().toLocaleTimeString();
                } 
                else if (text.includes("date")) {
                    reply = "Today's date is " + new Date().toLocaleDateString();
                }
                else if (text.includes("hello")) {
                    reply = "Hello! How can I help you?";
                }
                else if (text.includes("how are you")) {
                    reply = "I am doing great!";
                }
                else if (text.includes("open youtube")) {
                    window.open("https://www.youtube.com");
                    reply = "Opening YouTube";
                }
                else {
                    reply = "Sorry, I didn't understand";
                }

                const speech = new SpeechSynthesisUtterance(reply);
                window.speechSynthesis.speak(speech);
            };
        }
    </script>

</body>
</html>
